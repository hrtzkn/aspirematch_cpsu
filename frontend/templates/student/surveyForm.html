function checkFastClick() {
    const now = Date.now();
    if (now - lastClickTime < FAST_CLICK_TIME) {
        fastClickCount++;
    } else {
        fastClickCount = 0;
    }
    lastClickTime = now;

    if (fastClickCount > FAST_CLICK_LIMIT) {
        triggerSecurityLogout();
        return true; // stop further action
    }
    return false;
}

preferredProgram.addEventListener("change", () => {
    selectedProgram = preferredProgram.value;
    if(!selectedProgram) return;

    preferredProgramDiv.style.display = "none";
    interestDiv.style.display = "block";

    currentIndex = 0;
    renderQuestion();
});

// --- RENDER QUESTION ---
function renderQuestion() {
    errorMsg.classList.add("hidden");

    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex >= TOTAL_PAIRS) {
        finishSurvey();
        return;
    }

    const pair = interestPairs[currentIndex];
    if (!pair) return;

    updateProgress(currentIndex + 1);

    // Show AI response for this question (from previous answer)
    if (aiResponses[currentIndex]) {
        aiResponseWrapper.classList.remove("hidden");
        aiResponseText.textContent = aiResponses[currentIndex];

        // Show previous choice text if available
        if (surveyAnswers[currentIndex - 1]) {
            const prevChoice = surveyAnswers[currentIndex - 1];
            const prevText = interestPairs[currentIndex - 1].find(p => p.key === prevChoice).text;
            selectedInterest.textContent = `${prevChoice} – ${prevText}`;
        } else {
            selectedInterest.textContent = "";
        }
    } else {
        aiResponseWrapper.classList.add("hidden");
        selectedInterest.textContent = "";
        aiResponseText.textContent = "";
    }

    // Render options
    interestOptions.innerHTML = `
        <div class="mb-4">
            <label class="block hover:bg-[#f6ebcd] border border-[#166D3B] rounded-md mb-2 p-2">
                <input type="radio" name="interest" value="${pair[0].key}">
                ${pair[0].key}. ${pair[0].text}
            </label>
            <label class="block hover:bg-[#f6ebcd] border border-[#166D3B] rounded-md p-2">
                <input type="radio" name="interest" value="${pair[1].key}">
                ${pair[1].key}. ${pair[1].text}
            </label>
        </div>
    `;

    // Restore previous answer
    if (surveyAnswers[currentIndex]) {
        const prev = interestOptions.querySelector(`input[value="${surveyAnswers[currentIndex]}"]`);
        if (prev) prev.checked = true;
    }

    // Enable/disable back button
    backBtn.style.display = currentIndex === 0 ? "none" : "inline-block";

    // Enable next button
    nextBtn.disabled = false;
};

// --- HANDLE SELECTION & AUTO NEXT ---
interestOptions.addEventListener("change", async (e) => {
    if (e.target.name !== "interest") return;
    if (checkFastClick() || navigating) return;

    navigating = true;

    const letter = e.target.value;
    surveyAnswers[currentIndex] = letter;

    try {
        const res = await fetch("/student/chatbot_receive_interest", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({letter})
        });
        const chat = await res.json();
        aiResponses[currentIndex + 1] = chat.reply;
    } catch {
        aiResponses[currentIndex + 1] = "AI explanation unavailable.";
    }

    // Show AI response immediately for next question
    if (aiResponses[currentIndex + 1]) {
        aiResponseWrapper.classList.remove("hidden");
        aiResponseText.textContent = aiResponses[currentIndex + 1];
        selectedInterest.textContent = `${letter} – ${interestPairs[currentIndex].find(p => p.key === letter).text}`;
    }

    setTimeout(() => {
        // Check fast click again before advancing
        if (checkFastClick()) {
            navigating = false;
            return;
        }

        currentIndex++;
        renderQuestion();
        navigating = false;
    }, 300);
});

// --- NEXT BUTTON (manual override) ---
nextBtn.onclick = async () => {
    if (checkFastClick() || navigating) return;

    if (navigating) return;
    navigating = true;

    const selectedRadio = interestOptions.querySelector('input[name="interest"]:checked');

    if (!selectedRadio) {
        errorMsg.classList.remove("hidden");
        navigating = false;
        return;
    }

    const letter = selectedRadio.value;
    surveyAnswers[currentIndex] = letter;

    // Fetch AI explanation for next question
    try {
        const res = await fetch("/student/chatbot_receive_interest", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({letter})
        });
        const chat = await res.json();
        aiResponses[currentIndex + 1] = chat.reply;
    } catch {
        aiResponses[currentIndex + 1] = "AI explanation unavailable.";
    }

    currentIndex++;
    renderQuestion();
    navigating = false;
};

// --- BACK BUTTON ---
backBtn.onclick = () => {
  if (checkFastClick() || navigating) return;

  if (navigating) return;
  navigating = true;

  if (currentIndex > 0) {
      currentIndex--;
      renderQuestion();
  }

  navigating = false;
};

/* FINISH SURVEY */
function finishSurvey() {

  if (!selectedProgram) {
    alert("Please select preferred program.");
    return;
  }

  /* ensure all answered */
  for (let i = 0; i < TOTAL_PAIRS; i++) {

    if (!surveyAnswers[i]) {
      alert("Please complete all questions.");
      currentIndex = i;
      renderQuestion();
      return;
    }

  }

  submitSurvey();

}


/* SUBMIT */
function submitSurvey(){

  if(surveySubmitting) return;

  surveySubmitting = true;

  interestOptions.innerHTML =
    "<p class='text-blue-600 font-semibold'>Submitting survey...</p>";

  fetch("/student/submit_survey",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      preferred_program:selectedProgram,
      answers:surveyAnswers
    })
  })
  .then(res=>res.json())
  .then(data=>{

    if(data.status==="success"){

      interestOptions.innerHTML =
      "<p class='text-green-600 font-semibold'>Survey submitted successfully</p>";

      setTimeout(()=>{
        window.location.href="/student/home";
      },1500);

    }else{

      interestOptions.innerHTML =
      "<p class='text-red-600 font-semibold'>"+data.message+"</p>";

    }

  })
  .catch(()=>{

    interestOptions.innerHTML =
    "<p class='text-red-600 font-semibold'>Submission failed</p>";

});

}

function triggerSecurityLogout(){

  const popup = document.getElementById("securityPopup");
  const countdown = document.getElementById("logoutCountdown");

  popup.classList.remove("hidden");
  popup.classList.add("flex");

  let seconds = 5;

  const timer = setInterval(()=>{

      seconds--;
      countdown.textContent = seconds;

      if(seconds <= 0){
          clearInterval(timer);
          window.location.href = "/student/logout";
      }

  },1000);

}

function updateProgress(qNumber){

  const total = TOTAL_PAIRS;

  const percent = Math.round((qNumber / total) * 100);

  progressBar.style.width = percent + "%";

  progressText.textContent = `Question ${qNumber} / ${total}`;
  progressPercent.textContent = percent + "%";

}

function startSurveyTimer() {
    const timer = setInterval(() => {
        // Calculate minutes and seconds
        const minutes = Math.floor(surveyTime / 60);
        const seconds = surveyTime % 60;

        // Display formatted time
        timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

        // Change color when 1 minute remaining
        if (surveyTime <= 60) {
            timerDisplay.classList.remove("text-green-600");
            timerDisplay.classList.add("text-red-600");
        }

        // Time up
        if (surveyTime <= 0) {
            clearInterval(timer);
            alert("Time is up. You will be logged out.");
            window.location.href = "/student/logout";
        }

        surveyTime--; // decrement
    }, 1000);
}

// Start the timer AFTER surveyTime and timerDisplay are defined
startSurveyTimer();
